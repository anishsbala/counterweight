name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check app tests scripts
      - run: pytest

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose build api worker
      - run: docker compose up -d
      - name: Verify queued worker flow
        run: python scripts/smoke_jobs.py
      - name: Print service logs on failure
        if: failure()
        run: docker compose logs
      - name: Stop services
        if: always()
        run: docker compose down -v
